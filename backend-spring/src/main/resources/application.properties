spring.application.name=nrt

# Database URL (localhost:5432 is default, 'ecommerce_db' is your DB name)
spring.datasource.url=jdbc:postgresql://localhost:5432/ecommerce_db

# Credentials
spring.datasource.username=postgres
spring.datasource.password=postgres

# Driver Class
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Custom path for Swagger UI (default is /swagger-ui/index.html)
springdoc.swagger-ui.path=/api-docs
# Path for the raw JSON/YAML OpenAPI spec
springdoc.api-docs.path=/v3/api-docs

# ── JWT Configuration ────────────────────────────────────────────────────────
# Base64-encoded 256-bit secret key (replace with env variable in production)
app.jwt.secret=ZGlzdHJpYnV0aW9uLWVycC1zZWNyZXQta2V5LW5ydC0yMDI2LXZlcnktbG9uZy1zZWNyZXQ=
# Token expiration: 24 hours in milliseconds
app.jwt.expiration-ms=86400000
